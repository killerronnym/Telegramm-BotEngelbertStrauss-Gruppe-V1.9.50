version: '3.8'

services:
  bot-system:
    build: .
    container_name: bot-engine-v2
    restart: always
    ports:
      - "9002:9002"
    volumes:
      - ./instance:/app/instance
      - ./logs:/app/logs
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Berlin
    # Falls eine externe MySQL Datenbank genutzt wird, kann diese hier verlinkt werden
    # networks:
    #   - bot-network

    # networks:
    #   bot-network:
    #     driver: bridge
